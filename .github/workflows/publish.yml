name: Publish to npm (Alpha)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      # 1. Bump to a prerelease version (e.g., 0.1.4-alpha.0)
      - name: Bump prerelease version
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          # Use 'prerelease' to increment alpha.0 -> alpha.1, etc.
          # Use '--preid' to set the tag name
          npm version prerelease --preid=alpha -m "chore: alpha release %s [skip ci]"
          git push --follow-tags

      # 2. Build SECOND so the binary sees the new version number
      - run: npm run build --if-present
      - run: npm test

      # 3. Publish with the --tag alpha flag
      - run: npm publish --access=public --tag alpha
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
